
<h2 class="sr-only">ATS Platform agile roadmap — 7 epics across 12 sprints</h2>

<style>
.rm-wrap { padding: 0 0 2rem; font-family: var(--font-sans); }

.rm-meta {
  display: flex; gap: 24px; padding: 0 0 1.5rem;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  margin-bottom: 1.5rem; flex-wrap: wrap;
}
.rm-stat { display: flex; flex-direction: column; gap: 2px; }
.rm-stat-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.rm-stat-key { font-size: 12px; color: var(--color-text-secondary); }

.epic { margin-bottom: 2rem; }

.epic-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.epic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.epic-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.epic-sub { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; white-space: nowrap; }

.sprints { display: flex; flex-direction: column; gap: 10px; }

.sprint {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
}

.sprint-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-secondary);
  cursor: pointer; user-select: none;
}
.sprint-tag {
  font-size: 11px; font-weight: 500;
  padding: 2px 7px; border-radius: 4px;
  font-family: var(--font-mono); flex-shrink: 0;
}
.sprint-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.sprint-pts {
  font-size: 11px; color: var(--color-text-secondary);
  font-family: var(--font-mono);
}
.sprint-chevron {
  width: 14px; height: 14px; flex-shrink: 0;
  color: var(--color-text-secondary); transition: transform 0.2s;
  display: flex; align-items: center; justify-content: center; font-size: 10px;
}
.sprint-chevron.open { transform: rotate(90deg); }

.stories { display: none; }
.stories.open { display: block; }

.story {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px; align-items: start;
  padding: 9px 14px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  font-size: 13px;
}
.story:last-child { border-bottom: none; }
.story-num { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); padding-top: 1px; }
.story-text { color: var(--color-text-primary); line-height: 1.5; }
.story-badge {
  font-size: 10px; font-weight: 500;
  padding: 2px 6px; border-radius: 4px;
  white-space: nowrap; margin-top: 1px;
  font-family: var(--font-mono);
}

.deps-row {
  display: flex; gap: 6px; align-items: center;
  padding: 7px 14px;
  background: var(--color-background-secondary);
  border-top: 0.5px solid var(--color-border-tertiary);
}
.deps-label { font-size: 11px; color: var(--color-text-tertiary); }
.dep-chip {
  font-size: 10px; color: var(--color-text-secondary);
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 1px 6px; border-radius: 4px;
  font-family: var(--font-mono);
}

.progress-track {
  height: 2px; background: var(--color-border-tertiary);
}
.progress-fill { height: 100%; transition: width 0.6s ease; }
</style>

<div class="rm-wrap">

<div class="rm-meta">
  <div class="rm-stat"><span class="rm-stat-val">12</span><span class="rm-stat-key">sprints</span></div>
  <div class="rm-stat"><span class="rm-stat-val">7</span><span class="rm-stat-key">epics</span></div>
  <div class="rm-stat"><span class="rm-stat-val">215</span><span class="rm-stat-key">story points</span></div>
  <div class="rm-stat"><span class="rm-stat-val">24 wks</span><span class="rm-stat-key">timeline</span></div>
  <div class="rm-stat"><span class="rm-stat-val">2-week</span><span class="rm-stat-key">sprint cadence</span></div>
</div>

<div id="roadmap"></div>
</div>

<script>
const EPICS = [
  {
    color: '#378ADD', label: 'Foundation & infrastructure', sub: 'Weeks 1–4 · Sprints 1–2',
    sprints: [
      { id:'S01', title:'Project scaffold', pts:18, deps:[],
        stories:[
          { t:'FastAPI app factory, Docker Compose, folder structure per corrected spec', tag:'infra' },
          { t:'PostgreSQL setup, Alembic base migration — Company & HRUser models', tag:'critical' },
          { t:'pydantic-settings: all secrets from env, app refuses to start if any are missing', tag:'critical' },
          { t:'Redis setup for distributed locks and Celery broker', tag:'infra' },
          { t:'GitHub Actions CI: lint + pytest on every pull request', tag:'infra' },
        ]},
      { id:'S02', title:'Auth system', pts:16, deps:['S01'],
        stories:[
          { t:'HRUser model with bcrypt-hashed passwords via passlib', tag:'critical' },
          { t:'POST /auth/token: login returns JWT with user_id + company_id in payload', tag:'critical' },
          { t:'get_current_user dependency: decodes + validates JWT, fetches user from DB', tag:'critical' },
          { t:'HR routers registered with dependencies=[Depends(get_current_user)] globally', tag:'critical' },
          { t:'Test conftest: TestClient with Depends(get_db) override for isolated DB', tag:'medium' },
        ]},
    ]
  },
  {
    color: '#1D9E75', label: 'Candidate system', sub: 'Weeks 5–8 · Sprints 3–4',
    sprints: [
      { id:'S03', title:'Links & application flow', pts:20, deps:['S02'],
        stories:[
          { t:'CandidateLink: secrets.token_urlsafe(32), expires_at, company_id, is_valid property', tag:'critical' },
          { t:'POST /links (HR): generate shareable link with 7-day expiry window', tag:'high' },
          { t:'POST /apply/{token}: reject used (is_used) or expired (expires_at) links with 410', tag:'critical' },
          { t:'python-magic MIME check on upload bytes — extension spoofing is blocked', tag:'high' },
          { t:'Duplicate guard: same email + job_id returns 409 before creating candidate', tag:'high' },
        ]},
      { id:'S04', title:'Resume storage & candidate CRUD', pts:18, deps:['S03'],
        stories:[
          { t:'Resume service: store file bytes to S3 (or local), write path to resume_path column', tag:'high' },
          { t:'Candidate model: company_id, DB indexes on company+job and email columns', tag:'critical' },
          { t:'GET /candidates paginated, company-scoped; GET /candidates/{id}', tag:'medium' },
          { t:'PUT /candidates/{id}/status: StatusUpdate enum, company_id guard on every query', tag:'critical' },
          { t:'Integration tests: full apply flow, duplicate block, expired link rejection', tag:'medium' },
        ]},
    ]
  },
  {
    color: '#EF9F27', label: 'Email engine', sub: 'Weeks 9–12 · Sprints 5–6',
    sprints: [
      { id:'S05', title:'Templates & enqueue', pts:16, deps:['S04'],
        stories:[
          { t:'EmailTemplate: key, subject, body, variables[], is_active, company_id with unique constraint', tag:'high' },
          { t:'Seed defaults: applied_thanks, followup, rejection, interview_invite', tag:'medium' },
          { t:'enqueue_email(): deduplication check before insert — idempotent by design', tag:'high' },
          { t:'cancel_pending_followups(): cancels pending followup on status change', tag:'high' },
          { t:'CRUD routes for templates: GET/POST/PUT (HR-only)', tag:'medium' },
        ]},
      { id:'S06', title:'Worker & retry logic', pts:22, deps:['S05'],
        stories:[
          { t:'EmailQueue: locked_by, locked_at, retry_backoff_until, composite index on status+scheduled_at', tag:'critical' },
          { t:'Worker: SELECT FOR UPDATE SKIP LOCKED — safe across multiple parallel worker processes', tag:'critical' },
          { t:'Graceful shutdown: SIGTERM/SIGINT handled via asyncio.Event, drains current batch first', tag:'high' },
          { t:'Exponential backoff: retry_backoff_until = now + 2^retry_count minutes (2, 4, 8…)', tag:'high' },
          { t:'Stale lock reclaim: re-claim rows where locked_at older than 60s (crashed worker recovery)', tag:'high' },
          { t:'Celery task wiring: send_email task connected to Redis broker', tag:'infra' },
        ]},
    ]
  },
  {
    color: '#7F77DD', label: 'AI service layer', sub: 'Weeks 13–14 · Sprint 7',
    sprints: [
      { id:'S07', title:'Gemini integration', pts:18, deps:['S02'],
        stories:[
          { t:'AIService ABC: all 3 methods decorated @abstractmethod — no more silent pass stubs', tag:'high' },
          { t:'GeminiService: asyncio.to_thread wrapper + tenacity retry (3 attempts, exp backoff)', tag:'high' },
          { t:'POST /ai/generate-template: type + context → professional email body', tag:'ai' },
          { t:'POST /ai/improve-jd: clean and improve job description text', tag:'ai' },
          { t:'POST /ai/summarize-resume: 3–5 bullet summary from resume text', tag:'ai' },
          { t:'Dependency injection: swap Gemini for any impl with zero changes to routes', tag:'medium' },
        ]},
    ]
  },
  {
    color: '#E24B4A', label: 'Security hardening', sub: 'Weeks 15–16 · Sprint 8',
    sprints: [
      { id:'S08', title:'Security & multi-tenancy audit', pts:20, deps:['S04','S06'],
        stories:[
          { t:'Audit every DB query for company_id scope — unscoped query = potential data breach', tag:'critical' },
          { t:'CORS: explicit allow_origins from settings.ALLOWED_ORIGINS, never wildcard in prod', tag:'critical' },
          { t:'slowapi: rate-limit POST /apply/{token} to 5 req/min per IP', tag:'high' },
          { t:'Token expiry enforced on every apply: checks both is_used and expires_at', tag:'critical' },
          { t:'Security test suite: cross-tenant 404 (not 403 — never reveal resource existence)', tag:'high' },
          { t:'OWASP Top 10 review checklist against all endpoints, findings documented', tag:'high' },
        ]},
    ]
  },
  {
    color: '#D85A30', label: 'React frontend', sub: 'Weeks 17–20 · Sprints 9–10',
    sprints: [
      { id:'S09', title:'HR dashboard & candidates', pts:24, deps:['S08'],
        stories:[
          { t:'Login page: JWT stored in memory only (never localStorage), axios request interceptor', tag:'ux' },
          { t:'Candidates table: paginated, status badge colours, sortable columns, search filter', tag:'ux' },
          { t:'Candidate detail drawer: resume preview, status dropdown, activity timeline', tag:'ux' },
          { t:'Link generator: create link, copy URL, configure expiry, track usage status', tag:'ux' },
          { t:'Optimistic UI for status updates — instant feedback without full page reload', tag:'ux' },
        ]},
      { id:'S10', title:'Templates & AI features', pts:20, deps:['S09'],
        stories:[
          { t:'Template editor: rich text, variable insertion helpers, live preview pane', tag:'ux' },
          { t:'AI generate button: POST /ai/generate-template, populate editor on response', tag:'ai' },
          { t:'Email queue monitor: pending/sent/failed table with retry action on failed rows', tag:'ux' },
          { t:'Settings page: SMTP config, company profile, HR user management', tag:'ux' },
        ]},
    ]
  },
  {
    color: '#5F5E5A', label: 'QA, testing & launch', sub: 'Weeks 21–24 · Sprints 11–12',
    sprints: [
      { id:'S11', title:'Full test coverage', pts:16, deps:['S10'],
        stories:[
          { t:'All 15 integration test cases: apply flow, auth, multi-tenancy guards, email triggers', tag:'high' },
          { t:'Locust load test: 100 concurrent applies, check worker queue depth and email lag', tag:'high' },
          { t:'Worker stress test: 2 parallel workers, assert zero duplicate emails sent', tag:'critical' },
          { t:'AI mock: fake Gemini errors in CI to verify retry logic without real API calls', tag:'ai' },
        ]},
      { id:'S12', title:'Production hardening & launch', pts:17, deps:['S11'],
        stories:[
          { t:'Docker Compose → Kubernetes manifests (or Railway/Render config for smaller teams)', tag:'infra' },
          { t:'Alembic CI check: block merging if unapplied migrations exist in main branch', tag:'infra' },
          { t:'Sentry: error tracking on API + worker, alert on email failure rate spike', tag:'high' },
          { t:'Seed script: demo company, HR user, job, templates for staging environment', tag:'medium' },
          { t:'Runbook: on-call guide for failed queue, stale worker, DB migration rollback', tag:'medium' },
        ]},
    ]
  },
];

const TAG_STYLE = {
  critical: 'background:#FCEBEB;color:#A32D2D',
  high:     'background:#FAEEDA;color:#633806',
  medium:   'background:#E6F1FB;color:#0C447C',
  ai:       'background:#EEEDFE;color:#3C3489',
  infra:    'background:#EAF3DE;color:#3B6D11',
  ux:       'background:#FBEAF0;color:#72243E',
};

const root = document.getElementById('roadmap');

EPICS.forEach(epic => {
  const epicEl = document.createElement('div');
  epicEl.className = 'epic';

  const headerEl = document.createElement('div');
  headerEl.className = 'epic-row';
  headerEl.innerHTML = `
    <div class="epic-dot" style="background:${epic.color}"></div>
    <span class="epic-name">${epic.label}</span>
    <span class="epic-sub">${epic.sub}</span>
  `;
  epicEl.appendChild(headerEl);

  const sprintsEl = document.createElement('div');
  sprintsEl.className = 'sprints';

  epic.sprints.forEach((sprint, si) => {
    const card = document.createElement('div');
    card.className = 'sprint';

    const tagStyle = `background:${epic.color}18;color:${epic.color}`;

    const head = document.createElement('div');
    head.className = 'sprint-head';
    head.innerHTML = `
      <span class="sprint-tag" style="${tagStyle}">${sprint.id}</span>
      <span class="sprint-title">${sprint.title}</span>
      <span class="sprint-pts">${sprint.pts} pts</span>
      <span class="sprint-chevron" id="chev-${sprint.id}">&#9654;</span>
    `;

    const track = document.createElement('div');
    track.className = 'progress-track';
    const fill = document.createElement('div');
    fill.className = 'progress-fill';
    fill.style.background = epic.color;
    fill.style.width = '0%';
    fill.dataset.target = si === 0 ? '100' : si === 1 ? '45' : '0';
    track.appendChild(fill);

    const storiesEl = document.createElement('div');
    storiesEl.className = 'stories';
    storiesEl.id = `stories-${sprint.id}`;

    sprint.stories.forEach((story, i) => {
      const row = document.createElement('div');
      row.className = 'story';
      row.innerHTML = `
        <span class="story-num">${String(i+1).padStart(2,'0')}</span>
        <span class="story-text">${story.t}</span>
        <span class="story-badge" style="${TAG_STYLE[story.tag]}">${story.tag}</span>
      `;
      storiesEl.appendChild(row);
    });

    if (sprint.deps.length) {
      const depsRow = document.createElement('div');
      depsRow.className = 'deps-row';
      depsRow.innerHTML = `<span class="deps-label">Needs:</span>${sprint.deps.map(d=>`<span class="dep-chip">${d}</span>`).join('')}`;
      storiesEl.appendChild(depsRow);
    }

    head.addEventListener('click', () => {
      const open = storiesEl.classList.toggle('open');
      const chev = document.getElementById(`chev-${sprint.id}`);
      if (open) chev.classList.add('open'); else chev.classList.remove('open');
    });

    if (si === 0) {
      storiesEl.classList.add('open');
      setTimeout(() => document.getElementById(`chev-${sprint.id}`)?.classList.add('open'), 0);
    }

    card.appendChild(head);
    card.appendChild(track);
    card.appendChild(storiesEl);
    sprintsEl.appendChild(card);
  });

  epicEl.appendChild(sprintsEl);
  root.appendChild(epicEl);
});

setTimeout(() => {
  document.querySelectorAll('.progress-fill[data-target]').forEach(el => {
    el.style.width = el.dataset.target + '%';
  });
}, 200);
</script>
